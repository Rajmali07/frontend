<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaint Triage - Swach Raipur Admin</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script>
    // Tailwind theme setup
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'smart-green': '#28a745',
            'smart-blue': '#17a2b8',
            'smart-yellow': '#ffc107',
            'smart-red': '#dc3545',
            'smart-gray': '#6c757d',
            'smart-dark': '#333333',
          },
          fontFamily: { 'roboto': ['Roboto', 'sans-serif'] },
          boxShadow: {
            'card': '0 4px 12px rgba(0,0,0,0.08)',
          }
        }
      }
    };
  </script>

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      transition: all 0.3s ease;
    }

    .card {
      background: #fff;
      border-radius: 0.75rem;
      box-shadow: var(--tw-shadow-card);
      padding: 1.25rem;
      transition: all 0.3s ease;
    }

    .dark .card {
      background: #2d3748;
      color: #e2e8f0;
    }

    .dark body {
      background: #1a202c;
    }
  </style>
</head>

<body class="font-roboto bg-gray-50 text-smart-dark dark:bg-gray-900 dark:text-gray-100">
  <!-- Header -->
  <header class="bg-white dark:bg-gray-800 shadow fixed top-0 left-0 right-0 z-40">
    <div class="container mx-auto px-4 flex justify-between items-center h-16">
      <a href="admin_dashboard.html" class="flex items-center space-x-2">
        <img src="assets/logo/swachchh_raipur.svg" alt="Logo" class="h-10 rounded-md">
        <span class="text-lg font-bold text-smart-green">Swach Raipur Admin</span>
      </a>
      <a href="admin_dashboard.html"
        class="text-sm text-smart-gray dark:text-gray-300 hover:text-smart-blue transition-colors">&larr; Back</a>
    </div>
  </header>

  <!-- Main -->
  <main class="container mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-12">
    <h1 id="page-title" class="text-3xl font-bold mb-6 text-smart-dark dark:text-white">Complaint Triage</h1>

    <div id="complaint-list" class="space-y-4">
      <p class="text-smart-gray dark:text-gray-400" id="loading-msg">Loading complaints...</p>
    </div>
  </main>
  <!-- Driver Picker Modal -->
  <div id="assign-modal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 hidden">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl p-8 w-full max-w-md">
      <div class="flex justify-between items-center mb-6 border-b pb-3 border-gray-200 dark:border-gray-600">
        <h2 class="text-xl font-bold text-smart-dark dark:text-white">Assign Complaint</h2>
        <button id="close-assign-modal"
          class="text-smart-gray hover:text-smart-red text-2xl leading-none">&times;</button>
      </div>
      <p class="text-sm text-smart-gray dark:text-gray-400 mb-1">Complaint: <span id="modal-complaint-id"
          class="font-semibold text-smart-dark dark:text-white"></span></p>
      <p class="text-sm text-smart-gray dark:text-gray-400 mb-5">Zone: <span id="modal-zone"
          class="font-semibold text-smart-green"></span></p>

      <div class="mb-6">
        <p class="block text-sm font-semibold text-smart-dark dark:text-white mb-2">Zone Driver</p>
        <div id="driver-select"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 text-sm bg-gray-50 dark:bg-gray-700 dark:text-white">
          Looking up zone driver...
        </div>
      </div>

      <div id="assign-toast" class="hidden text-sm font-medium py-2 px-3 rounded-lg mb-4"></div>

      <div class="flex justify-end gap-3">
        <button id="cancel-assign-btn"
          class="bg-gray-200 text-smart-dark font-medium py-2 px-5 rounded-lg hover:bg-gray-300 transition-colors">Cancel</button>
        <button id="confirm-assign-btn"
          class="bg-smart-green text-white font-bold py-2 px-5 rounded-lg hover:bg-green-700 transition-colors disabled:opacity-50"
          disabled>Assign ✓</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const zone = urlParams.get("zone");
      const list = document.getElementById("complaint-list");

      const token = localStorage.getItem("token");
      if (!token) {
        alert("Admin session expired. Please log in again.");
        window.location.href = "admin_login.html";
        return;
      }

      // --- Modal Elements ---
      const assignModal = document.getElementById("assign-modal");
      const driverSelect = document.getElementById("driver-select");
      const confirmAssignBtn = document.getElementById("confirm-assign-btn");
      const assignToast = document.getElementById("assign-toast");
      const modalComplaintId = document.getElementById("modal-complaint-id");
      const modalZone = document.getElementById("modal-zone");

      let pendingComplaintId = null;
      let pendingZone = null;
      let pendingDriverId = null;

      // Pre-load drivers once
      let allDrivers = [];
      try {
        const dRes = await fetch("https://novomesh-backend.onrender.com/api/admin/drivers");
        allDrivers = await dRes.json();
      } catch (err) {
        console.error("Could not load drivers:", err);
      }

      function openAssignModal(complaintId, zone) {
        pendingComplaintId = complaintId;
        pendingZone = zone;
        modalComplaintId.textContent = `#${complaintId}`;
        modalZone.textContent = zone || "Unknown";
        assignToast.classList.add("hidden");

        const matchedDriver = allDrivers.find(d => (d.zone || "").trim() === (zone || "").trim());
        pendingDriverId = matchedDriver ? matchedDriver.id : null;

        if (matchedDriver) {
          driverSelect.textContent = `${matchedDriver.username} (${matchedDriver.email}) - ${matchedDriver.zone || "No zone"}`;
          confirmAssignBtn.disabled = false;
        } else {
          driverSelect.textContent = `No driver is allotted to ${zone || "this zone"}`;
          confirmAssignBtn.disabled = true;
        }

        assignModal.classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function closeAssignModal() {
        assignModal.classList.add("hidden");
        document.body.style.overflow = "";
        pendingComplaintId = null;
        pendingZone = null;
        pendingDriverId = null;
      }

      document.getElementById("close-assign-modal").addEventListener("click", closeAssignModal);
      document.getElementById("cancel-assign-btn").addEventListener("click", closeAssignModal);
      assignModal.addEventListener("click", (e) => { if (e.target === assignModal) closeAssignModal(); });

      confirmAssignBtn.addEventListener("click", async () => {
        if (!pendingDriverId || !pendingComplaintId) return;
        confirmAssignBtn.disabled = true;
        confirmAssignBtn.textContent = "Assigning...";

        try {
          const res = await fetch(`https://novomesh-backend.onrender.com/api/admin/complaint/${pendingComplaintId}/assign`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({
              zone: pendingZone,
              assigned_driver: pendingDriverId
            })
          });
          const data = await res.json();

          if (res.ok) {
            assignToast.className = "text-sm font-medium py-2 px-3 rounded-lg mb-4 bg-green-100 text-smart-green";
            assignToast.textContent = `✅ ${data.message}`;
          } else {
            assignToast.className = "text-sm font-medium py-2 px-3 rounded-lg mb-4 bg-red-100 text-smart-red";
            assignToast.textContent = `❌ ${data.error || "Assignment failed"}`;
          }
          assignToast.classList.remove("hidden");

          setTimeout(() => {
            closeAssignModal();
            loadComplaints();
          }, 1500);

        } catch (err) {
          assignToast.className = "text-sm font-medium py-2 px-3 rounded-lg mb-4 bg-red-100 text-smart-red";
          assignToast.textContent = "❌ Network error. Is the server running?";
          assignToast.classList.remove("hidden");
          confirmAssignBtn.disabled = false;
          confirmAssignBtn.textContent = "Assign ✓";
        }
      });

      // 🧩 Load complaints
      async function loadComplaints() {
        try {
          const res = await fetch("https://novomesh-backend.onrender.com/api/admin/complaints", {
            headers: { "Authorization": `Bearer ${token}` }
          });
          if (!res.ok) throw new Error("Failed to fetch complaints");

          const complaints = await res.json();
          const zoneComplaints = zone
            ? complaints.filter(c => c.zone === zone)
            : complaints;

          list.innerHTML = "";

          if (!zoneComplaints.length) {
            list.innerHTML = `<p class="text-smart-gray dark:text-gray-400">No complaints found for this zone.</p>`;
            return;
          }

          zoneComplaints.forEach(c => {
            const card = document.createElement("div");
            card.className = "card border-l-4 border-smart-green flex justify-between items-center";

            const isAssigned = c.status === "Assigned";
            const statusColor = isAssigned ? "text-smart-green" : "text-smart-yellow";
            const assignedDriverInfo = c.assigned_driver
              ? `<span class="text-xs text-smart-blue block">👤 Assigned to: ${c.assigned_driver}</span>`
              : "";

            card.innerHTML = `
          <div>
            <span class="font-bold text-lg block">#${c.complaint_id}: ${c.issue_type}</span>
            <span class="text-sm text-smart-gray block">📍 ${c.location}</span>
            <span class="text-sm ${statusColor} block">Status: ${c.status}</span>
            ${assignedDriverInfo}
          </div>
          <div class="flex gap-2">
            <button class="bg-gray-500 text-white px-3 py-1 rounded examine-btn" data-id="${c.complaint_id}">Examine</button>
            <button class="bg-smart-green text-white px-3 py-1 rounded assign-btn" data-id="${c.complaint_id}" data-zone="${c.zone}">Assign</button>
            <button class="bg-smart-red text-white px-3 py-1 rounded reject-btn" data-id="${c.complaint_id}">Reject</button>
          </div>
        `;
            list.appendChild(card);
          });
        } catch (err) {
          list.innerHTML = `<p class="text-smart-red">❌ Error loading complaints: ${err.message}</p>`;
        }
      }

      // 🟡 Handle all button clicks via delegation
      list.addEventListener("click", async (e) => {
        if (e.target.classList.contains("examine-btn")) {

  const complaintId = e.target.dataset.id;

  try {

    const res = await fetch(`https://novomesh-backend.onrender.com/api/admin/complaint/${complaintId}`);
    const data = await res.json();

    document.getElementById("complaint-details").innerHTML = `
      <p><b>Issue:</b> ${data.issue_type}</p>
      <p><b>Location:</b> ${data.location}</p>
      <p><b>Description:</b> ${data.description || "N/A"}</p>
      <p><b>Status:</b> ${data.status}</p>
      <p><b>Assigned to:</b> ${data.assigned_driver || "Not assigned"}</p>
    `;

document.getElementById("citizen-photo").src = data.photo_url;

    if (data.status === "Verified" && data.driver_photo_url) {

  document.getElementById("driver-photo").src = data.driver_photo_url;
  document.getElementById("driver-photo-box").style.display = "block";

} else {

  document.getElementById("driver-photo-box").style.display = "none";

}

    document.getElementById("complaint-modal").classList.remove("hidden");

  } catch {

    alert("Could not fetch complaint details.");

  }
}

        if (e.target.classList.contains("assign-btn")) {
          openAssignModal(e.target.dataset.id, e.target.dataset.zone);
        }

        if (e.target.classList.contains("reject-btn")) {
          const complaintId = e.target.dataset.id;
          if (!confirm("Are you sure you want to reject this complaint?")) return;
          try {
            const res = await fetch(`https://novomesh-backend.onrender.com/api/admin/complaint/${complaintId}`, { method: "DELETE" });
            const data = await res.json();
            alert(data.message);
            loadComplaints();
          } catch { alert("Network error during rejection."); }
        }
      });

      loadComplaints();

      // Close modal button handler
      document.getElementById("close-modal").addEventListener("click", () => {
        document.getElementById("complaint-modal").classList.add("hidden");
      });
    });
  </script>
  <!-- Complaint Image Modal -->
<div id="complaint-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center z-50">

  <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-[650px]">

    <h2 class="text-xl font-bold mb-4">Complaint Details</h2>

    <div id="complaint-details" class="text-sm mb-4"></div>

    <div class="grid grid-cols-2 gap-4">

      <div>
        <p class="font-semibold mb-1">Citizen Photo</p>
        <img id="citizen-photo" class="rounded shadow w-full">
      </div>

      <div id="driver-photo-box">
        <p class="font-semibold mb-1">Driver Completion Photo</p>
        <img id="driver-photo" class="rounded shadow w-full">
      </div>

    </div>

    <div class="flex justify-end mt-4">
      <button id="close-modal"
        class="bg-smart-red text-white px-4 py-2 rounded">
        Close
      </button>
    </div>

  </div>

</div>

</body>

</html>
