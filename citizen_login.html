<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citizen Portal Login - Clean City</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind Custom Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "smart-green": "#28a745",
            "smart-green-light": "#dcfce7",
            "smart-blue": "#17a2b8",
            "smart-yellow": "#ffc107",
            "smart-dark": "#333333",
            "smart-gray": "#6c757d",
          },
          fontFamily: {
            roboto: ["Roboto", "sans-serif"],
          },
          boxShadow: {
            header: "0 2px 6px rgba(0,0,0,0.1)",
            card: "0 4px 12px rgba(0,0,0,0.1)",
            "card-hover": "0 8px 24px rgba(0,0,0,0.15)",
          },
        },
      },
    };
  </script>

  <style>
    body {
      font-family: "Roboto", sans-serif;
    }
    .nav-link {
      position: relative;
      text-decoration: none;
      color: #333333;
      transition: color 0.3s;
    }
    .nav-link::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #28a745;
      transition: width 0.3s ease-in-out;
    }
    .nav-link:hover {
      color: #28a745;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .main-content {
      min-height: calc(100vh - 160px);
    }
  </style>
</head>

<body class="font-roboto text-smart-dark antialiased">
  <!-- Header -->
  <header class="bg-white shadow-header sticky top-0 z-50">
    <nav
      class="container mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-[80px]"
    >
      <a href="index.html" class="flex items-center space-x-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="36"
          height="36"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="text-smart-green"
        >
          <path d="M3 6h18"></path>
          <path
            d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
          ></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
        <span class="text-xl font-bold text-smart-green">Clean City</span>
      </a>

      <div class="hidden md:flex items-center space-x-8">
        <a href="index.html" class="nav-link font-medium">Home</a>
        <a href="about.html" class="nav-link font-medium">About</a>
        <a href="awareness.html" class="nav-link font-medium">Awareness</a>
        <a href="blog.html" class="nav-link font-medium">Blog</a>
        <a href="contact.html" class="nav-link font-medium">Contact</a>
      </div>

      <div class="md:hidden">
        <button id="menu-btn" class="text-smart-dark focus:outline-none">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </nav>

    <div id="mobile-menu" class="hidden md:hidden bg-white shadow-lg">
      <a href="index.html" class="block px-6 py-3 text-smart-dark hover:bg-gray-50">Home</a>
      <a href="about.html" class="block px-6 py-3 text-smart-dark hover:bg-gray-50">About</a>
      <a href="awareness.html" class="block px-6 py-3 text-smart-dark hover:bg-gray-50">Awareness</a>
      <a href="blog.html" class="block px-6 py-3 text-smart-dark hover:bg-gray-50">Blog</a>
      <a href="contact.html" class="block px-6 py-3 text-smart-dark hover:bg-gray-50">Contact</a>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content bg-gray-50 flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full">
      <div class="bg-white p-8 rounded-2xl shadow-card border-t-4 border-smart-green">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-smart-dark">Citizen Portal Login</h2>
          <p class="text-smart-gray mt-2">
            Sign in to report issues and track your complaints.
          </p>
        </div>

        <form id="login-form" class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-smart-gray mb-1">Email</label>
            <input
              type="email"
              id="email"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-smart-green focus:border-transparent"
              placeholder="you@example.com"
              value="citizen@example.com"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-smart-gray mb-1">Password</label>
            <div class="relative">
              <input
                type="password"
                id="password"
                required
                class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-smart-green focus:border-transparent"
                placeholder="••••••••"
                value="citizen123"
              />
              <button
                type="button"
                id="toggle-password"
                class="absolute inset-y-0 right-0 px-3 flex items-center text-smart-gray hover:text-smart-dark"
              >
                <svg
                  id="eye-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="hidden"
                >
                  <path
                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                  ></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg
                  id="eye-off-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between text-sm">
            <div class="flex items-center">
              <input id="remember-me" type="checkbox" class="h-4 w-4 text-smart-green border-gray-300 rounded focus:ring-smart-green" />
              <label for="remember-me" class="ml-2 text-smart-gray">Remember me</label>
            </div>
            <a href="#" id="forgot-password-link" class="text-smart-green hover:text-green-700 font-medium">Forgot password?</a>
          </div>

          <div id="form-status" class="text-center"></div>

          <button
            type="submit"
            class="w-full py-3 px-4 bg-smart-green text-white font-bold rounded-lg shadow-lg hover:bg-green-700 transition-all"
          >
            Sign In
          </button>
        </form>

        <p class="text-center text-sm text-smart-gray mt-8">
          New to Clean City?
          <a href="citizen_register.html" class="font-medium text-smart-green hover:text-green-700">Create an account</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Forgot Password Modal -->
  <div
    id="forgot-password-modal"
    class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 hidden"
  >
    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-sm w-full relative">
      <button id="close-modal-btn" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
      </button>
      <h3 class="text-2xl font-bold text-smart-dark mb-4">Reset Password</h3>
      <p class="text-smart-gray mb-6">Enter your email to receive a reset link.</p>

      <form id="reset-form" class="space-y-4">
        <input type="email" id="reset-email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-smart-green" placeholder="you@example.com" />
        <div id="reset-status" class="text-center"></div>
        <button type="submit" class="w-full bg-smart-green text-white py-3 rounded-lg hover:bg-green-700 font-bold">Send Reset Link</button>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Menu
      const menuBtn = document.getElementById("menu-btn");
      const mobileMenu = document.getElementById("mobile-menu");
      menuBtn.addEventListener("click", () => mobileMenu.classList.toggle("hidden"));

      // Password visibility
      const togglePasswordBtn = document.getElementById("toggle-password");
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eye-icon");
      const eyeOffIcon = document.getElementById("eye-off-icon");

      togglePasswordBtn.addEventListener("click", () => {
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
        eyeIcon.classList.toggle("hidden");
        eyeOffIcon.classList.toggle("hidden");
      });

      // Login Form
      const loginForm = document.getElementById("login-form");
      const formStatus = document.getElementById("form-status");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (!email || !password) {
          formStatus.innerHTML = `<p class='text-red-600 bg-red-100 p-3 rounded-lg'>Please fill in both fields.</p>`;
          return;
        }

        formStatus.innerHTML = `<p class='text-smart-gray bg-gray-100 p-3 rounded-lg'>Signing you in...</p>`;

        try {
          const response = await fetch("https://novomesh-backend.onrender.com/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          let data;
          const text = await response.text();
          try {
            data = text ? JSON.parse(text) : {};
          } catch (err) {
            console.error("Invalid JSON:", text);
            throw new Error("Server returned invalid response");
          }

          if (response.ok) {
            localStorage.setItem("citizenUser", JSON.stringify(data.user));
            formStatus.innerHTML = `<p class='text-smart-green bg-smart-green-light p-3 rounded-lg'>Success! Redirecting...</p>`;
            setTimeout(() => (window.location.href = "citizen_dashboard.html"), 1500);
          } else {
            formStatus.innerHTML = `<p class='text-red-600 bg-red-100 p-3 rounded-lg'>${data.message || "Invalid credentials."}</p>`;
          }
        } catch (err) {
          console.error(err);
          formStatus.innerHTML = `<p class='text-red-600 bg-red-100 p-3 rounded-lg'>Network error. Try again later.</p>`;
        }
      });

      // Forgot Password Modal
      const modal = document.getElementById("forgot-password-modal");
      const forgotPasswordLink = document.getElementById("forgot-password-link");
      const closeModalBtn = document.getElementById("close-modal-btn");
      const resetForm = document.getElementById("reset-form");
      const resetStatus = document.getElementById("reset-status");

      forgotPasswordLink.addEventListener("click", (e) => {
        e.preventDefault();
        modal.classList.remove("hidden");
      });

      closeModalBtn.addEventListener("click", () => {
        modal.classList.add("hidden");
        resetStatus.innerHTML = "";
        resetForm.reset();
      });

      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.classList.add("hidden");
      });

      resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("reset-email").value;

        if (!email) {
          resetStatus.innerHTML = `<p class='text-red-600 bg-red-100 p-3 rounded-lg'>Please enter your email.</p>`;
          return;
        }

        resetStatus.innerHTML = `<p class='text-smart-gray bg-gray-100 p-3 rounded-lg'>Sending reset link...</p>`;

        try {
          const response = await fetch("https://novomesh-backend.onrender.com/auth/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });

          let data;
          const text = await response.text();
          try {
            data = text ? JSON.parse(text) : {};
          } catch (err) {
            console.error("Invalid JSON:", text);
            throw new Error("Server returned invalid response");
          }
          if (response.ok) {
            resetStatus.innerHTML = `<p class='text-smart-green bg-smart-green-light p-3 rounded-lg'>${data.message || "Reset link sent! Check your email."}</p>`;
          } else {
            resetStatus.innerHTML = `<p class='text-red-600 bg-red-100 p-3 rounded-lg'>${data.message || "Failed to send link."}</p>`;
          }
        } catch (err) {
          console.error(err);
          resetStatus.innerHTML = `<p class='text-red-600 bg-red-100 p-3 rounded-lg'>Server error. Try again later.</p>`;
        }
      });
    });
  </script>
</body>
</html>
