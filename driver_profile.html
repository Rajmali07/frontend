<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Driver Dashboard</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Google Font (Roboto) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <!-- Configure Tailwind (Same as driver_dashboard) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'smart-green': '#28a745', 
                        'smart-green-light': '#dcfce7', 
                        'smart-blue': '#17a2b8',  
                        'smart-blue-light': '#d4f0f5', 
                        'smart-yellow': '#ffc107', 
                        'smart-yellow-light': '#fffbeb', 
                        'smart-dark': '#333333',   
                        'smart-gray': '#6c757d',   
                        'smart-red': '#dc3545', 
                        'smart-red-light': '#fdebec', 
                    },
                    fontFamily: {
                        'roboto': ['Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        'header': '0 2px 6px rgba(0,0,0,0.1)',
                        'card': '0 4px 12px rgba(0,0,0,0.1)',
                        'card-hover': '0 8px 24px rgba(0,0,0,0.15)',
                        'top': '0 -2px 6px rgba(0,0,0,0.1)', 
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa; /* A light gray background */
        }
    </style>
</head>
<body class="font-roboto text-smart-dark antialiased">

    <!-- Dashboard Header (Fixed Top Bar) -->
    <header class="bg-white shadow-header fixed top-0 left-0 right-0 z-40 h-16">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-full">
            <!-- Logo & Title -->
             <a href="index.html" class="flex items-center space-x-2">
                 <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-smart-yellow">
                      <rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>
                 </svg>
                 <span class="text-xl font-bold text-smart-yellow hidden sm:block">Driver Portal</span>
             </a>
            
            <!-- Profile Dropdown -->
            <div class="relative">
                <button id="profile-btn" class="flex items-center space-x-2 focus:outline-none">
                    <span id="header-driver-name" class="text-smart-dark font-medium hidden md:block">Hello, Driver!</span>
                    <!-- Driver Profile Pic -->
                    <img id="header-driver-avatar" class="w-10 h-10 rounded-full object-cover border-2 border-smart-yellow" src="https://placehold.co/100x100/FFFBEB/ffc107?text=D" alt="Driver Profile Picture">
                </button>
                
                <!-- Dropdown Menu -->
                <div id="profile-dropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 z-50 hidden">
                    <a href="driver_profile.html" class="block px-4 py-2 text-sm text-smart-dark hover:bg-gray-100">View Profile</a> 
                    <a href="driver_settings.html" class="block px-4 py-2 text-sm text-smart-dark hover:bg-gray-100">Settings</a> 
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="index.html" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <!-- Added pt-16 for fixed header and pb-20 for fixed bottom nav -->
    <main class="container mx-auto max-w-3xl px-4 sm:px-6 lg:px-8 pt-20 pb-24">
        
        <!-- Page Title -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-smart-dark">My Profile</h1>
            <a href="driver_settings.html" class="bg-smart-yellow text-white font-medium py-2 px-4 rounded-lg shadow-md hover:bg-yellow-600 transition-colors flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <span>Edit Profile</span>
            </a>
        </div>

        <!-- Profile Card -->
        <div class="bg-white p-6 sm:p-8 rounded-xl shadow-card">
            
            <!-- Profile Header -->
            <div class="flex flex-col sm:flex-row items-center sm:space-x-6 border-b border-gray-200 pb-6 mb-6">
                <img id="profile-avatar" class="w-32 h-32 rounded-full object-cover border-4 border-smart-yellow mb-4 sm:mb-0" src="https://placehold.co/200x200/FFFBEB/ffc107?text=D" alt="Driver Profile Picture">
                <div>
                    <h2 id="profile-name" class="text-3xl font-bold text-smart-dark text-center sm:text-left">Driver</h2>
                    <p class="text-lg text-smart-gray text-center sm:text-left">Driver ID: <span id="profile-id" class="font-medium text-smart-dark">Loading...</span></p>
                    <p class="text-sm text-smart-gray text-center sm:text-left">Member Since: <span id="member-since">Loading...</span></p>
                </div>
            </div>

            <!-- Profile Details -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-smart-gray mb-1">Email Address</label>
                    <p id="profile-email" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">Loading...</p>
                </div>
                <!-- Phone -->
                <div>
                    <label class="block text-sm font-medium text-smart-gray mb-1">Phone Number</label>
                    <p id="profile-phone" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">Loading...</p>
                </div>
                 <!-- Vehicle ID -->
                 <div>
                    <label class="block text-sm font-medium text-smart-gray mb-1">Vehicle ID</label>
                    <p id="profile-vehicle" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">Loading...</p>
                </div>
                 <!-- Assigned Zone -->
                 <div>
                    <label class="block text-sm font-medium text-smart-gray mb-1">Assigned Zone</label>
                    <p id="profile-zone" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">Loading...</p>
                </div>
                <!-- Performance Stats -->
                <div class="md:col-span-2 border-t pt-6 mt-2">
                     <h3 class="text-lg font-semibold text-smart-dark mb-3">Performance (Today)</h3>
                     <div class="grid grid-cols-2 gap-4">
                         <div class="bg-smart-yellow-light p-3 rounded-lg text-center">
                             <div id="tasks-assigned" class="text-2xl font-bold text-smart-yellow">0</div>
                             <div class="text-sm text-smart-gray">Tasks Assigned</div>
                         </div>
                         <div class="bg-smart-green-light p-3 rounded-lg text-center">
                             <div id="tasks-completed" class="text-2xl font-bold text-smart-green">0</div>
                             <div class="text-sm text-smart-gray">Tasks Completed</div>
                         </div>
                     </div>
                </div>
            </div>

        </div>

    </main>

    <!-- Fixed Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-top z-40 h-16 flex justify-around items-center md:hidden">
        <a href="driver_dashboard.html" class="flex flex-col items-center text-smart-gray hover:text-smart-yellow p-2"> 
            <!-- Dashboard Icon -->
             <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span class="text-xs font-medium">Dashboard</span>
        </a>
        <a href="driver_route.html" class="flex flex-col items-center text-smart-gray hover:text-smart-yellow p-2"> 
            <!-- Route/Map Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
            <span class="text-xs font-medium">Route</span>
        </a>
        <a href="driver_history.html" class="flex flex-col items-center text-smart-gray hover:text-smart-yellow p-2"> 
            <!-- History Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
            <span class="text-xs font-medium">History</span>
        </a>
        <a href="driver_profile.html" class="flex flex-col items-center text-smart-yellow p-2"> <!-- Active color yellow -->
            <!-- Profile Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="text-xs font-medium">Profile</span>
        </a>
    </nav>

    <!-- JavaScript for Interactions -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const driver = JSON.parse(localStorage.getItem("driver"));
            const token = localStorage.getItem("driverToken");

            if (!driver || !token) {
                window.location.href = "driver_login.html";
                return;
            }

            const formatMemberSince = (dateValue) => {
                if (!dateValue) return "N/A";

                const date = new Date(dateValue);
                return date.toLocaleDateString("en-IN", {
                    month: "short",
                    year: "numeric"
                });
            };

            const updateDriverUi = (driverData) => {
                const driverName = driverData.username || "Driver";
                const avatarLetter = driverName.charAt(0).toUpperCase();

                document.getElementById("header-driver-name").textContent = `Hello, ${driverName}!`;
                document.getElementById("header-driver-avatar").src = `https://placehold.co/100x100/FFFBEB/ffc107?text=${avatarLetter}`;
                document.getElementById("profile-avatar").src = `https://placehold.co/200x200/FFFBEB/ffc107?text=${avatarLetter}`;
                document.getElementById("profile-name").textContent = driverName;
                document.getElementById("profile-id").textContent = driverData.id || "N/A";
                document.getElementById("member-since").textContent = formatMemberSince(driverData.created_at);
                document.getElementById("profile-email").textContent = driverData.email || "N/A";
                document.getElementById("profile-phone").textContent = driverData.phone || "N/A";
                document.getElementById("profile-vehicle").textContent = driverData.vehicle || "No Vehicle";
                document.getElementById("profile-zone").textContent = driverData.zone || "Unassigned";
            };

            const updateTaskStats = (tasks) => {
                const today = new Date().toDateString();
                const todaysTasks = tasks.filter((task) => {
                    if (!task.created_at) return false;
                    return new Date(task.created_at).toDateString() === today;
                });

                const completedStatuses = ["verified", "completed", "resolved"];
                const todaysCompleted = todaysTasks.filter((task) =>
                    completedStatuses.includes((task.status || "").toLowerCase())
                ).length;

                document.getElementById("tasks-assigned").textContent = todaysTasks.length;
                document.getElementById("tasks-completed").textContent = todaysCompleted;
            };

            const loadProfileData = async () => {
                try {
                    const [profileResponse, taskResponse] = await Promise.all([
                        fetch("https://novomesh-backend.onrender.com/api/v1/driver/profile", {
                            headers: {
                                "Authorization": `Bearer ${token}`
                            }
                        }),
                        fetch(`https://novomesh-backend.onrender.com/api/v1/driver/tasks?driver_id=${encodeURIComponent(driver.id || "")}&zone=${encodeURIComponent(driver.zone || "")}`, {
                            headers: {
                                "Authorization": `Bearer ${token}`
                            }
                        })
                    ]);

                    const profileResult = await profileResponse.json();
                    const taskResult = await taskResponse.json();

                    if (profileResponse.ok && profileResult.driver) {
                        updateDriverUi(profileResult.driver);
                        localStorage.setItem("driver", JSON.stringify(profileResult.driver));
                    } else {
                        updateDriverUi(driver);
                    }

                    if (taskResponse.ok && Array.isArray(taskResult)) {
                        updateTaskStats(taskResult);
                    }
                } catch (error) {
                    console.error("Error loading driver profile:", error);
                    updateDriverUi(driver);
                }
            };
            
            // Profile Dropdown Toggle
            const profileBtn = document.getElementById('profile-btn');
            const profileDropdown = document.getElementById('profile-dropdown');

            profileBtn.addEventListener('click', () => {
                profileDropdown.classList.toggle('hidden');
            });

            // Close dropdown when clicking outside
            window.addEventListener('click', (e) => {
                 // Added optional chaining for safety
                if (!profileBtn?.contains(e.target) && !profileDropdown?.contains(e.target)) { 
                    profileDropdown?.classList.add('hidden'); 
                }
            });

            loadProfileData();
        });
    </script>

</body>
</html>
