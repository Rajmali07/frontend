    <!-- JavaScript for Interactions -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- Elements ---
            const profileBtn = document.getElementById('profile-btn');
            const profileDropdown = document.getElementById('profile-dropdown');
            const historyAccordion = document.getElementById('history-accordion');
            const dateFilterInput = document.getElementById('date-filter');
            const filterBtn = document.getElementById('filter-btn');

            // --- Mock Task History Data ---
            const historyData = [
                 // Today (Oct 27, 2025 - Assuming current date)
                { id: "WMC-8301", type: "Bin", location: "Near Sector 4 Market", date: "2025-10-27", completedTime: "03:45 PM", beforeImg: "https://placehold.co/300x200/FEE2E2/DC2626?text=Before+8301", afterImg: "https://placehold.co/300x200/DCFCE7/16A34A?text=After+8301+Verified" },
                { id: "C-8305", type: "Civic", location: "Streetlight Out, Lane 2", date: "2025-10-27", completedTime: "11:15 AM", beforeImg: "https://placehold.co/300x200/FEF3C7/F59E0B?text=Streetlight+Issue", afterImg: "https://placehold.co/300x200/DBEAFE/2563EB?text=Streetlight+Fixed" },
                // Yesterday (Oct 26, 2025)
                { id: "WMC-8290", type: "Bin", location: "Community Hall Entrance", date: "2025-10-26", completedTime: "05:00 PM", beforeImg: "https://placehold.co/300x200/FEE2E2/DC2626?text=Before+8290", afterImg: "https://placehold.co/300x200/DCFCE7/16A34A?text=After+8290+Verified" },
                { id: "WMC-8288", type: "Bin", location: "Park Corner, Sector 11", date: "2025-10-26", completedTime: "10:30 AM", beforeImg: "https://placehold.co/300x200/FEE2E2/DC2626?text=Before+8288", afterImg: "https://placehold.co/300x200/DCFCE7/16A34A?text=After+8288+Verified" },
                 // Oct 25, 2025
                 { id: "WMC-8275", type: "Bin", location: "Bus Stop, Main Road", date: "2025-10-25", completedTime: "01:20 PM", beforeImg: "https://placehold.co/300x200/FEE2E2/DC2626?text=Before+8275", afterImg: "https://placehold.co/300x200/DCFCE7/16A34A?text=After+8275+Verified" },
            ];

            // --- Functions ---

            // Function to format date string (e.g., "October 27, 2025")
            function formatDate(dateString) {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                return new Date(dateString + 'T00:00:00').toLocaleDateString('en-US', options); // Add T00:00:00 to avoid timezone issues
            }

            // Function to render history items
            function renderHistory(data) {
                historyAccordion.innerHTML = ''; // Clear previous items

                // Group data by date
                const groupedData = data.reduce((acc, task) => {
                    const date = task.date;
                    if (!acc[date]) {
                        acc[date] = [];
                    }
                    acc[date].push(task);
                    return acc;
                }, {});

                 // Sort dates descending (most recent first)
                 const sortedDates = Object.keys(groupedData).sort((a, b) => new Date(b) - new Date(a));

                if (sortedDates.length === 0) {
                     historyAccordion.innerHTML = '<p class="text-center text-smart-gray italic">No completed tasks found for the selected date.</p>';
                     return;
                }

                 sortedDates.forEach(date => {
                     const tasksForDate = groupedData[date];
                     
                     const dateGroupDiv = document.createElement('div');
                     dateGroupDiv.className = 'accordion-group';

                     // Add date header (sticky)
                     const dateHeader = document.createElement('h2');
                     dateHeader.className = 'text-xl font-semibold text-smart-dark mb-2 sticky top-16 bg-gray-100 py-2 px-3 rounded -mx-3 z-10'; // Sticky header style
                     dateHeader.textContent = formatDate(date);
                     dateGroupDiv.appendChild(dateHeader);

                     tasksForDate.forEach(task => {
                         const itemDiv = document.createElement('div');
                         itemDiv.className = 'accordion-item bg-white rounded-lg shadow-card border border-gray-200 overflow-hidden'; // Added overflow-hidden

                         itemDiv.innerHTML = `
                            <button class="accordion-button w-full flex justify-between items-center p-4 text-left hover:bg-gray-50 transition-colors">
                                <div class="flex-grow mr-4">
                                     <span class="font-semibold text-smart-dark">${task.id} - ${task.location}</span>
                                     <span class="text-xs text-smart-gray block">Completed: ${task.completedTime}</span>
                                </div>
                                 <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-smart-gray flex-shrink-0"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </button>
                            <div class="accordion-content border-t border-gray-100">
                                <div class="p-4 grid grid-cols-1 sm:grid-cols-2 gap-4 items-start"> <!-- Changed items-center to items-start -->
                                    <div>
                                        <h4 class="font-medium text-sm mb-1 text-smart-gray">Before Cleanup:</h4>
                                        <img src="${task.beforeImg}" alt="Before Cleanup ${task.id}" class="rounded-md w-full h-auto object-cover border">
                                    </div>
                                    <div>
                                        <h4 class="font-medium text-sm mb-1 text-smart-gray">After Cleanup (AI Verified):</h4>
                                        <img src="${task.afterImg}" alt="After Cleanup ${task.id}" class="rounded-md w-full h-auto object-cover border">
                                    </div>
                                </div>
                            </div>
                         `;
                         dateGroupDiv.appendChild(itemDiv);
                     });
                     historyAccordion.appendChild(dateGroupDiv);
                 });

                 // Add event listeners for the newly created buttons
                 addAccordionListeners();
            }

            // Function to add accordion toggle listeners
            function addAccordionListeners() {
                const accordionButtons = historyAccordion.querySelectorAll('.accordion-button');
                accordionButtons.forEach(button => {
                    button.addEventListener('click', () => {
                        const item = button.closest('.accordion-item');
                        item.classList.toggle('open');
                    });
                });
            }

             // Function to filter history data by date
             function filterHistory() {
                 const selectedDate = dateFilterInput.value;
                 if (!selectedDate) {
                     renderHistory(historyData); // Show all if no date selected
                 } else {
                     const filteredData = historyData.filter(task => task.date === selectedDate);
                     renderHistory(filteredData);
                 }
             }

            // --- Event Listeners ---
            profileBtn.addEventListener('click', () => {
                profileDropdown.classList.toggle('hidden');
            });

             window.addEventListener('click', (e) => {
                if (!profileBtn.contains(e.target) && !profileDropdown?.contains(e.target)) { 
                    profileDropdown?.classList.add('hidden'); 
                }
            });

            filterBtn.addEventListener('click', filterHistory);
            // Optional: Filter immediately when date changes
            // dateFilterInput.addEventListener('change', filterHistory); 

            // --- Initial Render ---
            renderHistory(historyData); // Render all history initially

        });
    </script>
