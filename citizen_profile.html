<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Citizen Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'smart-green': '#28a745',
            'smart-green-light': '#dcfce7',
            'smart-blue': '#17a2b8',
            'smart-yellow': '#ffc107',
            'smart-dark': '#333333',
            'smart-gray': '#6c757d',
          },
          fontFamily: {
            'roboto': ['Roboto', 'sans-serif'],
          },
          boxShadow: {
            'header': '0 2px 6px rgba(0,0,0,0.1)',
            'card': '0 4px 12px rgba(0,0,0,0.1)',
            'card-hover': '0 8px 24px rgba(0,0,0,0.15)',
            'top': '0 -2px 6px rgba(0,0,0,0.1)',
          }
        }
      }
    }
  </script>

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f8f9fa;
    }
  </style>
</head>
<body class="font-roboto text-smart-dark antialiased">

  <!-- Header -->
  <header class="bg-white shadow-header fixed top-0 left-0 right-0 z-40">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
      <a href="index.html" class="flex items-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" class="text-smart-green">
          <path d="M3 6h18"></path>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        <span class="text-xl font-bold text-smart-green hidden sm:block">Citizen Portal</span>
      </a>

      <!-- Profile Dropdown -->
      <div class="relative">
        <button id="profile-btn" class="flex items-center space-x-2 focus:outline-none">
          <span id="user-greeting" class="text-smart-dark font-medium hidden md:block">Hello!</span>
          <img id="user-avatar" class="w-10 h-10 rounded-full object-cover border-2 border-smart-green"
            src="https://placehold.co/100x100/EAF7E8/28a745?text=U" alt="Profile Picture">
        </button>

        <div id="profile-dropdown"
          class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 z-50 hidden">
          <a href="citizen_profile.html" class="block px-4 py-2 text-sm text-smart-dark hover:bg-gray-100">View Profile</a>
          <a href="citizen_settings.html" class="block px-4 py-2 text-sm text-smart-dark hover:bg-gray-100">Settings</a>
          <div class="border-t border-gray-100 my-1"></div>
          <a href="index.html" id="logout-btn" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Logout</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto max-w-3xl px-4 sm:px-6 lg:px-8 pt-20 pb-24">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-smart-dark">My Profile</h1>
      <a href="citizen_settings.html"
        class="bg-smart-green text-white font-medium py-2 px-4 rounded-lg shadow-md hover:bg-green-700 transition-colors flex items-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Edit Profile</span>
      </a>
    </div>

    <!-- Profile Card -->
    <div class="bg-white p-6 sm:p-8 rounded-xl shadow-card">
      <div class="flex flex-col sm:flex-row items-center sm:space-x-6 border-b border-gray-200 pb-6 mb-6">
        <img id="profile-photo" class="w-32 h-32 rounded-full object-cover border-4 border-smart-green mb-4 sm:mb-0"
          src="https://placehold.co/200x200/EAF7E8/28a745?text=U" alt="Profile Picture">
        <div>
          <h2 id="profile-name" class="text-3xl font-bold text-smart-dark text-center sm:text-left">Loading...</h2>
          <p class="text-lg text-smart-gray text-center sm:text-left">
            Citizen ID: <span id="citizen-id" class="font-medium text-smart-dark">--</span>
          </p>
          <p id="member-since" class="text-sm text-smart-gray text-center sm:text-left">Member Since: --</p>
        </div>
      </div>

      <!-- Profile Details -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
        <div>
          <label class="block text-sm font-medium text-smart-gray mb-1">Email Address</label>
          <p id="user-email" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">--</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-smart-gray mb-1">Phone Number</label>
          <p id="user-phone" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">--</p>
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-smart-gray mb-1">Address</label>
          <p id="user-address" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">--</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-smart-gray mb-1">Valid ID No. (Masked)</label>
          <p id="user-id" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">XXXX-XXXX-XXXX</p>
        </div>
        <div>
          <label class="block text-sm font-medium text-smart-gray mb-1">Impact Points</label>
          <p id="user-points" class="text-lg text-smart-dark p-3 bg-gray-50 rounded-lg">--</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-top z-40 h-16 flex justify-around items-center md:hidden">
    <a href="citizen_dashboard.html" class="flex flex-col items-center text-smart-gray hover:text-smart-green p-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="mb-1">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span class="text-xs font-medium">Home</span>
    </a>
    <a href="citizen_report_bin.html"
      class="flex flex-col items-center text-smart-gray hover:text-smart-green p-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
        <path d="M3 6h18"></path>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
      </svg>
      <span class="text-xs font-medium">Report</span>
    </a>
    <a href="citizen_report_history.html"
      class="flex flex-col items-center text-smart-gray hover:text-smart-green p-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
      </svg>
      <span class="text-xs font-medium">History</span>
    </a>
    <a href="citizen_profile.html"
      class="flex flex-col items-center text-smart-green p-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span class="text-xs font-medium">Profile</span>
    </a>
  </nav>

  <!-- JS: Fetch user data -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = JSON.parse(localStorage.getItem("citizenUser"));
      if (!user) {
        window.location.href = "citizen_login.html";
        return;
      }

      const email = user.email;
      try {
        const res = await fetch(`https://novomesh-backend.onrender.com/api/v1/citizen/${email}`);
        const data = await res.json();

        if (res.ok && data.user) {
          const u = data.user;
          localStorage.setItem("citizenUser", JSON.stringify(u));
          document.getElementById("profile-name").textContent = u.username || "Unnamed User";
          document.getElementById("citizen-id").textContent = u.id || "N/A";
          document.getElementById("user-email").textContent = u.email;
          document.getElementById("user-phone").textContent = u.phone || "Not provided";
          document.getElementById("user-address").innerHTML = u.address?.replace(/\n/g, "<br>") || "No address";
          const maskedId = u.valid_id
            ? `${String(u.valid_id).slice(0, 4)}-XXXX-${String(u.valid_id).slice(-4)}`
            : "XXXX-XXXX-XXXX";
          document.getElementById("user-id").textContent = maskedId;
          document.getElementById("user-points").textContent = `${u.points || 0} Points`;

          document.getElementById("member-since").textContent =
            u.created_at ? `Member Since: ${new Date(u.created_at).toLocaleDateString()}` : "Member Since: --";

          const initials = u.username ? u.username.charAt(0).toUpperCase() : "U";
          document.getElementById("user-avatar").src =
            u.photo_url || `https://placehold.co/100x100/EAF7E8/28a745?text=${initials}`;
          document.getElementById("profile-photo").src =
            u.photo_url || `https://placehold.co/200x200/EAF7E8/28a745?text=${initials}`;
          document.getElementById("user-greeting").textContent = `Hello, ${u.username || "Citizen"}!`;
        } else {
          alert("⚠️ Could not load profile.");
        }
      } catch (err) {
        console.error("Error loading profile:", err);
        alert("Error connecting to server.");
      }

      // Profile dropdown toggle
      const btn = document.getElementById("profile-btn");
      const dropdown = document.getElementById("profile-dropdown");
      btn.addEventListener("click", () => dropdown.classList.toggle("hidden"));

      // Logout
      document.getElementById("logout-btn").addEventListener("click", (e) => {
        e.preventDefault();
        localStorage.removeItem("citizenUser");
        window.location.href = "citizen_login.html";
      });
    });
  </script>
</body>
</html>
