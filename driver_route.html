    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa; 
        }
        /* Make map container fill available space, considering header and nav */
        #map-container {
             height: calc(100vh - 64px - 64px); /* Full height minus header and bottom nav */
             width: 100%;
             position: absolute; /* Needed for Leaflet sizing */
             top: 64px; /* Height of header */
             left: 0;
             z-index: 10; /* Below header/nav */
        }
        #list-container {
             padding-top: 64px; /* Space for header */
             padding-bottom: 64px; /* Space for bottom nav */
             min-height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .leaflet-container {
             background: #f8f9fa; /* Match body background */
        }
         /* Custom icon styles */
        .leaflet-div-icon {
            background: transparent;
            border: none;
            text-align: center;
        }
        .marker-pin {
            width: 30px;
            height: 30px;
            border-radius: 50% 50% 50% 0;
            background: #ffc107; /* smart-yellow */
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -15px 0 0 -15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 1px solid #a07400; /* Darker yellow border */
        }
        .marker-pin::after {
            content: '';
            width: 14px;
            height: 14px;
            margin: 8px 0 0 8px;
            background: #fff;
            position: absolute;
            border-radius: 50%;
        }
        .marker-pin-civic { /* Different color for civic issues */
             background: #17a2b8; /* smart-blue */
             border: 1px solid #0e6471; /* Darker blue */
        }
        .marker-pin-highlight { /* Style for highlighted marker */
            background: #dc3545; /* smart-red */
            border: 1px solid #842029; /* Darker red */
            transform: rotate(-45deg) scale(1.2); /* Make it slightly larger */
        }
        .marker-number {
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            font-size: 10px;
            font-weight: bold;
            color: black;
            transform: rotate(45deg); /* Counter-rotate the number */
             z-index: 1; /* Ensure number is above pin */
        }
         /* View toggle buttons */
        .view-btn.active {
            background-color: #ffc107; /* smart-yellow */
            color: white;
        }
    </style>
</head>

    <script>
        // --- Embedded GeoJSON Data ---
        const cityData = { /* ... GeoJSON data copied from map.html ... */ 
            "type": "FeatureCollection", "features": [{"type": "Feature","properties": {"name": "City Boundary"},"geometry": {"type": "Polygon", "coordinates": [[[81.66229132525893, 21.189043516375335],[81.6589840720215, 21.18659941773022],[81.65830714846447, 21.18626901887231],[81.65732998148917, 21.18622759961272],[81.65710866946227, 21.186305581596145],[81.65665683669937, 21.18726340392172],[81.65583676857318, 21.188189150229846],[81.6543911430104, 21.19024357078753],[81.65236744001237, 21.19320451902493],[81.6518263313207, 21.19396683101523],[81.65071057406175, 21.195105321219145],[81.65059570411643, 21.194865807293],[81.64990352830591, 21.19424200684027],[81.64872617805321, 21.193892472442528],[81.64751000045663, 21.193972147586507],[81.64693466083821, 21.19416186560484],[81.64608510274661, 21.19421071871534],[81.64500038382533, 21.19419254014805],[81.64479677476999, 21.194304643796613],[81.64471671232133, 21.194596688850467],[81.64460600122226, 21.194852659375883],[81.64465745289056, 21.195214889970416],[81.64450495878606, 21.196006876551905],[81.64438471316583, 21.196276285390795],[81.64401036482275, 21.197173218751203],[81.6439433942133, 21.197345006620708],[81.64404962978898, 21.197373086650515],[81.64399658035171, 21.197530980862126],[81.64362827381461, 21.197610625357143],[81.6435462710308, 21.197704167211185],[81.64361274567858, 21.197758439841735],[81.64340454371859, 21.197951502718496],[81.64336690090431, 21.198027869085465],[81.64338906312969, 21.19814865822525],[81.64344479171376, 21.198257883488537],[81.64351670013832, 21.198410720216515],[81.64360656878966, 21.198591502076397],[81.64359653843036, 21.19869707240167],[81.64368326754698, 21.198815327739496],[81.6438455431516, 21.198885989032817],[81.64399785219797, 21.198949378409324],[81.64403882586038, 21.19905342902402],[81.64396092917445, 21.199213244561108],[81.64397983810943, 21.199361334553004],[81.64403320182436, 21.199440613002295],[81.64408692244467, 21.199605141936416],[81.64414119335714, 21.199800705066323],[81.64415789443899, 21.200146511494182],[81.6441258704009, 21.200352171640034],[81.6440843192209, 21.200557551989675],[81.64405690194121, 21.200842587897498],[81.64392811922829, 21.200898522349135],[81.64388907945693, 21.200995242271787],[81.64397566674648, 21.201059225569296],[81.64408100690082, 21.20106899131318],[81.64410159485118, 21.201335828680683],[81.64403954181921, 21.201561838683972],[81.6439305790538, 21.20160565441438],[81.6438195721961, 21.20166351864806],[81.6438571902687, 21.201736405730358],[81.64390350806667, 21.201805743472747],[81.64400872490245, 21.201863425804802],[81.6440423447454, 21.20195353088259],[81.6443616156464, 21.202295152555223],[81.6448478978997, 21.202348396931257],[81.6435593523509, 21.205991562183073],[81.64303951987847, 21.20904978021123],[81.64269946513696, 21.211726446833666],[81.6420291185442, 21.214066521361133],[81.64181075170109, 21.2162374960416],[81.64152237088132, 21.217254757031426],[81.64529796043166, 21.218171232832816],[81.64880011755127, 21.22000054016081],[81.64922854112217, 21.220725189085698],[81.68616406846434, 21.20059942075069],[81.6858688597058, 21.199684677066955],[81.68547645996318, 21.198752900300832],[81.68397256735625, 21.19844403549942],[81.67875344398925, 21.195821240579434],[81.67501490881858, 21.193811760819173],[81.67523023144139, 21.191876568107276],[81.67033716765172, 21.19116746244059],[81.66479000910618, 21.191310730539627],[81.66229066823172, 21.189043658605115],[81.66229132525893, 21.189043516375335]]]}}]};

        // --- Mock Task Data (with added coordinates) ---
        // Coordinates should ideally come from a backend based on address/location
         const tasks = [
            { id: "WMC-8349", type: "Bin", location: "Sector 12 Park", reported: "09:00 AM", status: "pending", lat: 21.195, lon: 81.650 },
            { id: "WMC-8351", type: "Bin", location: "Greenfield Area, Lane 5", reported: "10:00 AM", status: "pending", lat: 21.198, lon: 81.644 },
            { id: "WMC-8352", type: "Bin", location: "Opposite City Mall", reported: "11:30 AM", status: "pending", lat: 21.201, lon: 81.644 },
            { id: "C-8350", type: "Civic", location: "Near Bank, Main St (Pothole)", reported: "01:15 PM", status: "pending", lat: 21.210, lon: 81.643 },
            { id: "WMC-8301", type: "Bin", location: "Near Sector 4 Market", reported: "Oct 26", completed: "03:45 PM", status: "completed", lat: 21.190, lon: 81.660 }, // Example completed task (won't show marker)
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // --- Elements ---
            const mapContainer = document.getElementById('map-container');
            const listContainer = document.getElementById('list-container');
            const routeListItems = document.getElementById('route-list-items');
            const mapViewBtn = document.getElementById('map-view-btn');
            const listViewBtn = document.getElementById('list-view-btn');
            const searchInput = document.getElementById('search-input');

            let map;
            let markersLayer = L.layerGroup(); // Layer group for markers
            let routeLayer = L.layerGroup(); // Layer group for route line
            let highlightedMarker = null; // To keep track of the highlighted marker

            // --- Map Initialization ---
            function initializeMap() {
                 map = L.map('map', {
                    zoomSnap: 0.25,
                    zoomControl: true // Show zoom controls
                 });

                 // Add OpenStreetMap tile layer
                 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                 }).addTo(map);

                 // Add city boundary
                 const cityLayer = L.geoJSON(cityData, {
                     style: { color: "#17a2b8", weight: 2, fillOpacity: 0.0 } // Use smart-blue for boundary
                 }).addTo(map);

                 // Add mask outside city boundary
                 const bounds = [[-90, -180], [-90, 180], [90, 180], [90, -180]];
                 const cityPolygonLngLat = cityData.features[0].geometry.coordinates[0];
                 const cityPolygonLatLon = cityPolygonLngLat.map(coord => [coord[1], coord[0]]);
                 L.polygon([bounds, cityPolygonLatLon], {
                     color: "#f8f9fa", weight: 0, fillColor: "#f8f9fa", fillOpacity: 0.9, interactive: false
                 }).addTo(map);

                 map.fitBounds(cityLayer.getBounds()); // Fit map to city bounds initially
                 markersLayer.addTo(map); // Add marker layer group to map
                 routeLayer.addTo(map); // Add route layer group to map
            }

            // --- Marker Creation ---
            function createCustomIcon(task, index, isHighlighted = false) {
                 const pinClass = task.type === 'Civic' ? 'marker-pin-civic' : '';
                 const highlightClass = isHighlighted ? 'marker-pin-highlight' : '';
                 return L.divIcon({
                     className: 'leaflet-div-icon',
                     html: `<div class="marker-pin ${pinClass} ${highlightClass}"></div><span class="marker-number">${index + 1}</span>`,
                     iconSize: [30, 30],
                     iconAnchor: [15, 30], // Point of the icon which corresponds to marker's location
                     popupAnchor: [0, -32] // Point from which the popup should open relative to the iconAnchor
                 });
            }

            // --- Update Map Markers and Route ---
             function updateMap(filteredTasks) {
                 markersLayer.clearLayers();
                 routeLayer.clearLayers(); // Clear previous route line
                 const routePoints = []; // Array to hold coordinates for the route line

                 filteredTasks.forEach((task, index) => {
                     if (task.status === 'pending' && task.lat && task.lon) {
                         const isHighlighted = highlightedMarker && highlightedMarker.options.taskId === task.id;
                         const icon = createCustomIcon(task, index, isHighlighted);
                         const marker = L.marker([task.lat, task.lon], { icon: icon, taskId: task.id }) // Store taskId
                             .bindPopup(`<b>${index + 1}. ${task.id} (${task.type})</b><br>${task.location}<br><small>Reported: ${task.reported}</small>`);
                         
                         marker.on('click', () => {
                             highlightTask(task.id); // Highlight on click
                         });

                         markersLayer.addLayer(marker);
                         routePoints.push([task.lat, task.lon]); // Add point to route line
                     }
                 });

                 // Draw the route line if there are multiple points
                 if (routePoints.length > 1) {
                     const polyline = L.polyline(routePoints, { color: '#ffc107', weight: 4, opacity: 0.7 }); // smart-yellow route line
                     routeLayer.addLayer(polyline);
                 }
             }

            // --- Update List View ---
            function updateList(filteredTasks) {
                routeListItems.innerHTML = ''; // Clear existing list
                 if (filteredTasks.length === 0) {
                     routeListItems.innerHTML = '<p class="text-smart-gray italic">No tasks found matching your search.</p>';
                     return;
                 }
                filteredTasks.forEach((task, index) => {
                     if (task.status === 'pending') {
                         let typeBadgeClass = 'bg-smart-green-light text-smart-green';
                         if (task.type === 'Civic') {
                            typeBadgeClass = 'bg-smart-blue-light text-smart-blue';
                         }
                         const listItem = document.createElement('div');
                         listItem.className = `p-4 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-100 ${highlightedMarker && highlightedMarker.options.taskId === task.id ? 'ring-2 ring-smart-yellow' : ''}`; // Highlight list item
                         listItem.dataset.id = task.id;
                         listItem.innerHTML = `
                            <div class="flex items-center gap-2 mb-1">
                                <span class="font-semibold text-smart-dark">${index + 1}. ${task.id}</span>
                                <span class="text-xs font-medium ${typeBadgeClass} px-2 py-0.5 rounded-full">${task.type}</span>
                            </div>
                            <div class="text-sm text-smart-gray">${task.location}</div>
                            <div class="text-xs text-smart-gray">Reported: ${task.reported}</div>
                         `;
                         listItem.addEventListener('click', () => highlightTask(task.id));
                         routeListItems.appendChild(listItem);
                     }
                 });
            }
            
            // --- Highlight Task ---
             function highlightTask(taskId) {
                // Remove previous highlight visually from map and list
                if (highlightedMarker) {
                     const oldTask = tasks.find(t => t.id === highlightedMarker.options.taskId);
                     const oldIndex = tasks.filter(t => t.status === 'pending').findIndex(t => t.id === highlightedMarker.options.taskId);
                     if (oldTask && oldIndex !== -1) {
                         highlightedMarker.setIcon(createCustomIcon(oldTask, oldIndex, false));
                     }
                     const oldListItem = routeListItems.querySelector(`[data-id="${highlightedMarker.options.taskId}"]`);
                     oldListItem?.classList.remove('ring-2', 'ring-smart-yellow');
                 }
                 
                 highlightedMarker = null; // Reset highlighted marker

                 const taskToHighlight = tasks.find(t => t.id === taskId);
                 if (!taskToHighlight || taskToHighlight.status !== 'pending') return;

                 // Find the marker on the map
                 markersLayer.eachLayer(marker => {
                     if (marker.options.taskId === taskId) {
                         const taskIndex = tasks.filter(t => t.status === 'pending').findIndex(t => t.id === taskId);
                         marker.setIcon(createCustomIcon(taskToHighlight, taskIndex, true)); // Apply highlight style
                         marker.openPopup();
                         map.setView([taskToHighlight.lat, taskToHighlight.lon], 16); // Center map and zoom
                         highlightedMarker = marker; // Store reference
                     }
                 });

                 // Highlight in list view
                 const listItem = routeListItems.querySelector(`[data-id="${taskId}"]`);
                 listItem?.classList.add('ring-2', 'ring-smart-yellow');
                 listItem?.scrollIntoView({ behavior: 'smooth', block: 'center' }); // Scroll to item in list view

                 console.log("Highlighted Task:", taskId);
             }

            // --- View Toggle ---
            function switchView(view) {
                if (view === 'map') {
                    mapContainer.classList.remove('hidden');
                    listContainer.classList.add('hidden');
                    mapViewBtn.classList.add('active', 'bg-smart-yellow', 'text-white');
                    mapViewBtn.classList.remove('bg-white', 'text-smart-gray');
                    listViewBtn.classList.remove('active', 'bg-smart-yellow', 'text-white');
                    listViewBtn.classList.add('bg-white', 'text-smart-gray');
                    if (map) map.invalidateSize(); // Important for Leaflet resize
                } else {
                    mapContainer.classList.add('hidden');
                    listContainer.classList.remove('hidden');
                    listViewBtn.classList.add('active', 'bg-smart-yellow', 'text-white');
                    listViewBtn.classList.remove('bg-white', 'text-smart-gray');
                    mapViewBtn.classList.remove('active', 'bg-smart-yellow', 'text-white');
                    mapViewBtn.classList.add('bg-white', 'text-smart-gray');
                }
            }
            
            // --- Search Functionality ---
             function performSearch() {
                 const searchTerm = searchInput.value.toLowerCase().trim();
                 const filteredTasks = tasks.filter(task => 
                     task.status === 'pending' && // Only search pending tasks
                     (task.id.toLowerCase().includes(searchTerm) || 
                      task.location.toLowerCase().includes(searchTerm))
                 );
                 
                 updateMap(filteredTasks); // Update map markers based on search
                 updateList(filteredTasks); // Update list view based on search
                 
                 // If exactly one result, highlight it
                 if (filteredTasks.length === 1) {
                     highlightTask(filteredTasks[0].id);
                 } else {
                      // Remove highlight if search yields multiple or no results
                       if (highlightedMarker) {
                           const oldTask = tasks.find(t => t.id === highlightedMarker.options.taskId);
                           const oldIndex = tasks.filter(t => t.status === 'pending').findIndex(t => t.id === highlightedMarker.options.taskId);
                           if (oldTask && oldIndex !== -1) {
                               highlightedMarker.setIcon(createCustomIcon(oldTask, oldIndex, false));
                           }
                            const oldListItem = routeListItems.querySelector(`[data-id="${highlightedMarker.options.taskId}"]`);
                           oldListItem?.classList.remove('ring-2', 'ring-smart-yellow');
                           highlightedMarker = null;
                       }
                 }
             }

            // --- Get URL Parameters ---
            function getUrlParams() {
                 const params = new URLSearchParams(window.location.search);
                 return {
                     taskId: params.get('taskId'),
                     location: params.get('location')
                 };
            }

            // --- Initial Setup ---
            initializeMap(); // Initialize the map first
            
            const pendingTasks = tasks.filter(task => task.status === 'pending'); // Filter initially for pending tasks
            updateMap(pendingTasks);    // Populate map initially
            updateList(pendingTasks);   // Populate list initially

            const params = getUrlParams();
            if (params.taskId) {
                console.log("Task ID from URL:", params.taskId);
                 // Use setTimeout to ensure map is fully ready before highlighting
                 setTimeout(() => {
                     highlightTask(params.taskId);
                 }, 500); // Small delay might be needed
            } else {
                 // Optionally fit bounds to all markers if no specific task ID
                 if (markersLayer.getLayers().length > 0) {
                     map.fitBounds(markersLayer.getBounds().pad(0.1)); // Fit bounds with padding
                 }
            }


            // --- Event Listeners ---
            mapViewBtn.addEventListener('click', () => switchView('map'));
            listViewBtn.addEventListener('click', () => switchView('list'));
            searchInput.addEventListener('input', performSearch); // Search as user types

        });
    </script>

</body>
</html>
