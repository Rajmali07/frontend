    crossorigin=""
  />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: white;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .leaflet-container {
      background: white; /* Hide out-of-bound areas */
    }

    crossorigin=""

    // --- Map Logic ---

    // Create map
    const map = L.map('map', {
      zoomSnap: 0.25,
      zoomControl: true
    });

    // Add OpenStreetMap tile layer
    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    });
    osmLayer.addTo(map);

    // Add city polygon layer from our data variable
    const cityLayer = L.geoJSON(cityData, {
      style: {
        color: "#2b6cb0",     // border color (blue tone)
        weight: 2,
        fillColor: "#e3f2fd", // This color is now irrelevant
        fillOpacity: 0.0      // Set fill opacity to 0
      }
    }).addTo(map);

    // Zoom to city bounds
    map.fitBounds(cityLayer.getBounds());

    // Add mask outside city boundary
    
    // 1. Define the outer bounds of the entire world
    const bounds = [
      [-90, -180],
      [-90, 180],
      [90, 180],
      [90, -180]
    ];

    // 2. Get the city polygon coordinates (which are [Lng, Lat])
    const cityPolygonLngLat = cityData.features[0].geometry.coordinates[0];

    // 3. **FIX:** Convert coordinates to [Lat, Lng] for L.polygon
    //    L.geoJSON expects [Lng, Lat], but L.polygon expects [Lat, Lng]
    const cityPolygonLatLon = cityPolygonLngLat.map(coord => [coord[1], coord[0]]);
    
    // 4. Create the mask (a polygon of the world with a hole for the city)
    const mask = L.polygon([bounds, cityPolygonLatLon], {
      color: "#ffffff",
      weight: 0,
      fillColor: "#ffffff",
      fillOpacity: 1,
      interactive: false
    }).addTo(map);

</body>
</html>
