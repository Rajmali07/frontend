<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard - Clean City</title>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        const driver = JSON.parse(localStorage.getItem("driver"));
        if (!driver) window.location.href = "driver_login.html";
    </script>


    <!-- Load Google Font (Roboto) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <!-- Configure Tailwind (Adding smart-yellow-light) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'smart-green': '#28a745', // Main green
                        'smart-green-light': '#dcfce7', // Lighter green
                        'smart-blue': '#17a2b8',  // Admin blue
                        'smart-blue-light': '#d4f0f5', // Lighter blue
                        'smart-yellow': '#ffc107', // Driver yellow
                        'smart-yellow-light': '#fffbeb', // Lighter yellow
                        'smart-dark': '#333333',   // Footer/text dark
                        'smart-gray': '#6c757d',   // Subtext gray
                        'smart-red': '#dc3545', // Error red
                        'smart-red-light': '#fdebec', // Light error red
                    },
                    fontFamily: {
                        'roboto': ['Roboto', 'sans-serif'],
                    },
                    boxShadow: {
                        'header': '0 2px 6px rgba(0,0,0,0.1)',
                        'card': '0 4px 12px rgba(0,0,0,0.1)',
                        'card-hover': '0 8px 24px rgba(0,0,0,0.15)',
                        'top': '0 -2px 6px rgba(0,0,0,0.1)', // For bottom nav
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            /* A light gray background */
        }

        /* Style for completed tasks */
        .task-completed .task-details {
            /* Apply styles to a wrapper div if needed */
            opacity: 0.7;
            text-decoration: line-through;
        }

        /* Spinner for AI Verification */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        /* Spinner dark for AI status */
        .spinner-dark {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #6c757d;
            /* smart-gray */
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="font-roboto text-smart-dark antialiased">

    <!-- Dashboard Header (Fixed Top Bar) -->
    <header class="bg-white shadow-header fixed top-0 left-0 right-0 z-40">
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
            <!-- Logo & Title -->
            <a href="index.html" class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="text-smart-yellow">
                    <rect x="1" y="3" width="15" height="13"></rect>
                    <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                    <circle cx="5.5" cy="18.5" r="2.5"></circle>
                    <circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>
                <span class="text-xl font-bold text-smart-yellow hidden sm:block">Driver Portal</span>
            </a>

            <!-- Profile Dropdown -->
            <div class="relative">
                <button id="profile-btn" class="flex items-center space-x-2 focus:outline-none">
                    <span id="header-driver-name" class="text-smart-dark font-medium hidden md:block">Hello!</span>
                    <!-- Driver Profile Pic -->
                    <img id="driver-avatar" class="w-10 h-10 rounded-full object-cover border-2 border-smart-yellow"
                        src="https://placehold.co/100x100/FFFBEB/ffc107?text=D" alt="Driver Profile Picture">
                </button>

                <!-- Dropdown Menu -->
                <div id="profile-dropdown"
                    class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-1 z-50 hidden">
                    <a href="driver_profile.html" class="block px-4 py-2 text-sm text-smart-dark hover:bg-gray-100">View
                        Profile</a> <!-- Updated link -->
                    <a href="driver_settings.html"
                        class="block px-4 py-2 text-sm text-smart-dark hover:bg-gray-100">Settings</a>
                    <!-- Updated link -->
                    <div class="border-t border-gray-100 my-1"></div>
                    <a href="index.html" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <!-- Added pt-16 for fixed header and pb-20 for fixed bottom nav -->
    <main class="container mx-auto px-4 sm:px-6 lg:px-8 pt-20 pb-24">

        <!-- Welcome Section -->
        <section class="mb-6">
            <h1 id="welcome-heading" class="text-3xl font-bold text-smart-dark">Hello!</h1>
            <p id="vehicle-zone-info" class="text-smart-gray text-lg">Loading driver info...</p>
        </section>

        <!-- Quick Stats -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-card flex items-center space-x-3">
                <div class="p-3 rounded-full bg-smart-yellow-light">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-smart-yellow">
                        <path d="M8 2v4"></path>
                        <path d="M16 2v4"></path>
                        <rect width="18" height="18" x="3" y="4" rx="2"></rect>
                        <path d="M3 10h18"></path>
                    </svg>
                </div>
                <div>
                    <div id="today-assigned" class="text-2xl font-bold text-smart-dark">0</div> <!-- Default to 0 -->
                    <div class="text-sm text-smart-gray">Today's Assigned</div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-card flex items-center space-x-3">
                <div class="p-3 rounded-full bg-smart-green-light">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-smart-green">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <div>
                    <div id="today-completed" class="text-2xl font-bold text-smart-dark">0</div> <!-- Default to 0 -->
                    <div class="text-sm text-smart-gray">Today's Completed</div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-card flex items-center space-x-3">
                <div class="p-3 rounded-full bg-blue-100"> <!-- Using blue for pending -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-smart-blue">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <div>
                    <div id="pending-total" class="text-2xl font-bold text-smart-dark">0</div> <!-- Default to 0 -->
                    <div class="text-sm text-smart-gray">Pending Today</div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-card flex items-center space-x-3">
                <div class="p-3 rounded-full bg-smart-yellow-light">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-smart-yellow">
                        <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"></path>
                        <path d="M15 18H9"></path>
                        <path d="M12 6v10"></path>
                        <path d="M22 13.5V16a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-2.5a3.5 3.5 0 0 1 7 0c0 .9-.3 1.7-.9 2.3">
                        </path>
                    </svg>
                </div>
                <div>
                    <div class="text-xl font-bold text-smart-dark">On Route</div>
                    <div class="text-sm text-smart-gray">Vehicle Status</div>
                </div>
            </div>
        </section>

        <!-- Today's Route Section -->
        <section class="bg-white p-6 rounded-xl shadow-card">
            <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-smart-dark">Today's Optimized Route</h2>
                <div class="text-sm text-smart-gray mt-2 sm:mt-0">Monday, Oct 27, 2025</div>
            </div>

            <!-- Route List -->
            <div id="route-list" class="space-y-4">
                <!-- Route items will be dynamically generated here -->
                <!-- Example Structure (will be populated by JS) -->
                <!-- <div class="task-item flex ..." data-id="..."> ... </div> -->
            </div>
        </section>

    </main>

    <!-- Fixed Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-top z-40 h-16 flex justify-around items-center md:hidden">
        <a href="driver_dashboard.html" class="flex flex-col items-center text-smart-yellow p-2">
            <!-- Active color yellow -->
            <!-- Dashboard Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span class="text-xs font-medium">Dashboard</span>
        </a>
        <a href="driver_route.html" class="flex flex-col items-center text-smart-gray hover:text-smart-yellow p-2">
            <!-- Updated link -->
            <!-- Route/Map Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
                <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                <line x1="8" y1="2" x2="8" y2="18"></line>
                <line x1="16" y1="6" x2="16" y2="22"></line>
            </svg>
            <span class="text-xs font-medium">Route</span>
        </a>
        <a href="driver_history.html" class="flex flex-col items-center text-smart-gray hover:text-smart-yellow p-2">
            <!-- Updated link -->
            <!-- History Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
            </svg>
            <span class="text-xs font-medium">History</span>
        </a>
        <a href="driver_profile.html" class="flex flex-col items-center text-smart-gray hover:text-smart-yellow p-2">
            <!-- Updated link -->
            <!-- Profile Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mb-1">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="text-xs font-medium">Profile</span>
        </a>
    </nav>


    <!-- JavaScript for Interactions -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- Elements ---
            const profileBtn = document.getElementById('profile-btn');
            const profileDropdown = document.getElementById('profile-dropdown');
            const routeList = document.getElementById('route-list');
            const todayAssignedEl = document.getElementById('today-assigned');
            const todayCompletedEl = document.getElementById('today-completed');
            const pendingTotalEl = document.getElementById('pending-total');

            // --- Populate driver info from localStorage ---
            const driverName = driver?.username || driver?.name || 'Driver';
            const driverZone = driver?.zone || 'N/A';
            const driverVehicle = driver?.vehicle || 'N/A';
            const avatarLetter = driverName.charAt(0).toUpperCase();

            document.getElementById('header-driver-name').textContent = `Hello, ${driverName}!`;
            document.getElementById('welcome-heading').textContent = `Hello, ${driverName}!`;
            document.getElementById('vehicle-zone-info').textContent = `Vehicle: ${driverVehicle} | Zone: ${driverZone}`;
            document.getElementById('driver-avatar').src = `https://placehold.co/100x100/FFFBEB/ffc107?text=${avatarLetter}`;

            // --- Initial Data ---
            let tasks = [];
const fetchTasks = async () => {
    try {
        const token = localStorage.getItem("driverToken");
        const driverId = driver?.id || "";
        const driverZone = driver?.zone || "";

        if (!token) {
            alert("Session expired. Please login again.");
            window.location.href = "driver_login.html";
            return;
        }

        const taskUrl = new URL("https://novomesh-backend.onrender.com/api/v1/driver/tasks");
        if (driverId) taskUrl.searchParams.set("driver_id", driverId);
        if (driverZone) taskUrl.searchParams.set("zone", driverZone);

        const response = await fetch(
            taskUrl.toString(),
            {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            }
        );

        const data = await response.json();

        if (response.ok) {
            tasks = data;
            renderTasks();
        } else {
            console.error("Failed to fetch tasks:", data.message);
        }

    } catch (error) {
        console.error("Error fetching tasks:", error);
    }
};
            // --- Functions ---
            function renderTasks() {
                routeList.innerHTML = '';
                let completedCount = 0;
                let pendingCount = 0;

                if (!tasks.length) {
                    routeList.innerHTML = `<p class="text-smart-gray text-center py-4">No tasks assigned yet.</p>`;
                    todayAssignedEl.textContent = 0;
                    todayCompletedEl.textContent = 0;
                    pendingTotalEl.textContent = 0;
                    return;
                }

                tasks.forEach((task, index) => {
                    const status = task.status?.toLowerCase();
const isCompleted =
  status === "verified" ||
  status === "completed" ||
  status === "resolved";
                    if (isCompleted) completedCount++;
                    else pendingCount++;

                    const taskElement = document.createElement('div');
                    taskElement.className = `task-item flex flex-col sm:flex-row items-start sm:items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-200 gap-4 ${isCompleted ? 'task-completed' : ''}`;
                    taskElement.dataset.id = task.id;

                    const fileInputId = `file-upload-${task.id}`;

                    taskElement.innerHTML = `
      <div class="flex-grow task-details">
        <div class="flex items-center gap-2 mb-1">
          <span class="font-semibold text-smart-dark text-lg">#${task.complaint_id || 'N/A'} - ${task.issue_type || 'Issue'}</span>
          <span class="text-xs font-medium ${isCompleted ? 'bg-smart-green-light text-smart-green' : 'bg-smart-yellow-light text-smart-yellow'} px-2 py-0.5 rounded-full">${task.status}</span>
        </div>
        <div class="text-sm text-smart-gray">Location: ${task.location || 'Not specified'}</div>
        <div class="text-xs text-smart-gray">Zone: ${task.zone || 'N/A'}</div>
        ${(task.photo_url || task.driver_photo_url) ? `
          <div class="flex flex-wrap gap-4 mt-4">
            ${task.photo_url ? `
              <div>
                <p class="text-sm font-semibold text-smart-dark mb-1">Before</p>
                <img src="${task.photo_url}" alt="Citizen uploaded complaint" class="w-32 h-24 object-cover rounded shadow border">
              </div>
            ` : ''}
            ${task.driver_photo_url ? `
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <p class="text-sm font-semibold text-smart-dark">After</p>
                  <span class="text-[11px] font-medium bg-smart-green-light text-smart-green px-2 py-0.5 rounded-full">Recheck</span>
                </div>
                <img src="${task.driver_photo_url}" alt="Driver uploaded completion proof" class="w-32 h-24 object-cover rounded shadow border border-smart-green">
              </div>
            ` : ''}
          </div>
        ` : ''}
      </div>

      <div class="flex flex-col space-y-2 w-full sm:w-auto">
        <div class="flex items-center space-x-3">
          <input type="file" id="${fileInputId}" class="hidden" accept="image/*" capture="environment">
          <button class="verify-btn flex-1 sm:flex-none flex items-center justify-center gap-1 bg-smart-green text-white text-sm font-medium py-2 px-4 rounded-lg hover:bg-green-700 transition-colors ${isCompleted ? 'disabled:opacity-50' : ''}" ${isCompleted ? 'disabled' : ''} data-file-input-id="${fileInputId}">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <span class="btn-text">Verify</span>
            <span class="spinner hidden ml-2"></span>
          </button>
        </div>
        <div class="ai-status text-xs text-center h-4 mt-1"></div>
      </div>
    `;

                    routeList.appendChild(taskElement);

                    const fileInput = taskElement.querySelector(`#${fileInputId}`);
                    fileInput.addEventListener('change', handleFileUpload);

                });
                
                todayAssignedEl.textContent = tasks.length;
                todayCompletedEl.textContent = completedCount;
                pendingTotalEl.textContent = pendingCount;
            }
            function handleFileUpload(event) {
                const fileInput = event.target;
                const taskItem = fileInput.closest('.task-item');

                if (fileInput.files && fileInput.files[0] && taskItem) {
                    console.log(`File selected for task ${taskItem.dataset.id}:`, fileInput.files[0].name);
                    verifyTask(taskItem, fileInput.files[0]);
                } else {
                    console.log("No file selected or task item not found.");
                }
            }

            async function verifyTask(taskItem, file) {
                const aiStatusArea = taskItem.querySelector('.ai-status');
                const verifyButton = taskItem.querySelector('.verify-btn');
                const btnText = verifyButton.querySelector('.btn-text');
                const spinner = verifyButton.querySelector('.spinner');

                // Show AI processing state
                aiStatusArea.innerHTML = `<span class="flex items-center justify-center text-smart-gray"><div class="spinner-dark mr-1"></div> Verifying...</span>`;
                btnText.textContent = 'Verifying';
                spinner.classList.remove('hidden');
                verifyButton.disabled = true; // Disable button during verification

                const taskId = taskItem.dataset.id;
                const formData = new FormData();
                formData.append('photo', file);

                try {
                    const response = await fetch(`https://novomesh-backend.onrender.com/api/v1/driver/tasks/${taskId}/verify`, {
                        method: 'POST',
                        body: formData,
                    });

                    const data = await response.json();

                    if (response.ok) {
                        aiStatusArea.innerHTML = `<span class="text-smart-green font-medium">${data.message}</span>`;

                        // Find task in data and update status
                        const taskIndex = tasks.findIndex(t => t.id === taskId);
                        if (taskIndex !== -1) {
                            tasks[taskIndex].status = 'Completed';
                            tasks[taskIndex].driver_photo_url = data.task?.driver_photo_url || tasks[taskIndex].driver_photo_url;
                            tasks[taskIndex].completed = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

                            // Re-render the list to reflect changes visually
                            renderTasks();

                            // Optionally hide success message after a delay
                            setTimeout(() => {
                                const currentItem = routeList.querySelector(`.task-item[data-id="${taskId}"] .ai-status`);
                                if (currentItem) currentItem.innerHTML = '';
                            }, 3000);
                        }
                    } else {
                        aiStatusArea.innerHTML = `<span class="text-smart-red font-medium">${data.message}</span>`;
                        // Reset button state
                        btnText.textContent = 'Verify';
                        spinner.classList.add('hidden');
                        verifyButton.disabled = false; // Re-enable button on failure

                        // Optionally hide error message after a delay
                        setTimeout(() => { aiStatusArea.innerHTML = ''; }, 3000);
                    }
                } catch (error) {
                    console.error(`Verification error for task ${taskId}:`, error);
                    aiStatusArea.innerHTML = `<span class="text-smart-red font-medium">Network error. Please try again.</span>`;
                    // Reset button state
                    btnText.textContent = 'Verify';
                    spinner.classList.add('hidden');
                    verifyButton.disabled = false; // Re-enable button on failure
                }
            }
            function handleVerifyClick(event) {
    const button = event.target.closest('.verify-btn');
    if (!button || button.disabled) return;

    const fileInputId = button.getAttribute('data-file-input-id');
    const fileInput = document.getElementById(fileInputId);

    if (fileInput) {
        fileInput.click();  // 🔥 This opens camera
    }
}

            function handleNavigate(event) {
                const button = event.target.closest('.navigate-btn');
                if (!button || button.disabled) return;
                const taskItem = button.closest('.task-item');
                const taskId = taskItem.dataset.id;
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    // **MODIFIED:** Open driver_route.html with parameters
                    const routeUrl = `driver_route.html?taskId=${encodeURIComponent(taskId)}&location=${encodeURIComponent(task.location)}`;
                    window.location.href = routeUrl; // Navigate to the route page
                    console.log(`Redirecting to route page for: ${task.location}`);
                    // Removed alert
                }
            }


            // --- Event Listeners ---
            profileBtn.addEventListener('click', () => {
                profileDropdown.classList.toggle('hidden');
            });

            window.addEventListener('click', (e) => {
                if (!profileBtn.contains(e.target) && !profileDropdown?.contains(e.target)) { // Optional chaining
                    profileDropdown?.classList.add('hidden'); // Optional chaining
                }
            });

            // Use event delegation for dynamic elements
            routeList.addEventListener('click', (event) => {
                handleVerifyClick(event); // Handles clicks on the "Verify" button
                handleNavigate(event);   // Handles clicks on the "Navigate" button
            });
            // Note: File input 'change' listeners are added dynamically in renderTasks

            // --- Initial Render ---
            fetchTasks();

        });
    </script>

</body>

</html>
